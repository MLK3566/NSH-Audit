<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSH - Rapport d'Audit de Conformité</title>
    <style>
        /* --- CSS INTÉGRÉ --- */
        :root { --primary: #0056b3; --bg: #f4f7f6; --text: #333; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        /* En-tête et Logo */
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-bottom: 20px; }
        .logo { font-size: 24px; font-weight: bold; color: var(--primary); }
        
        /* Écran de connexion */
        #login-section { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh; }
        input[type="email"], input[type="password"], input[type="text"], input[type="date"] { 
            width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; 
        }
        button { background-color: var(--primary); color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; width: 100%; font-weight: bold; }
        button:hover { background-color: #004494; }
        
        /* Navigation (Onglets) */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { background-color: #e9ecef; color: var(--text); padding: 10px; flex: 1; border-radius: 4px; text-align: center; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background-color: var(--primary); color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Formulaire d'audit */
        .form-group { margin-bottom: 15px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; }
        textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; min-height: 120px; font-family: inherit; }
        
        /* Style d'impression pour la génération du PDF (Cache l'interface) */
        @media print {
            body { background: white; padding: 0; }
            .container { box-shadow: none; padding: 0; border: none; }
            .no-print { display: none !important; }
            input, textarea { border: none; padding: 0; resize: none; background: transparent; }
            header { border-bottom: 2px solid black; color: black; }
        }
    </style>
</head>
<body>

    <!-- 1. ÉCRAN D'AUTHENTIFICATION -->
    <div id="login-section" class="container">
        <h2 class="logo">NSH - Accès Sécurisé</h2>
        <input type="email" id="email" placeholder="Email professionnel">
        <input type="password" id="password" placeholder="Mot de passe">
        <button onclick="login()">Se connecter</button>
        <p id="auth-error" style="color: red; display: none; margin-top: 10px;">Identifiants incorrects.</p>
    </div>

    <!-- 2. APPLICATION PRINCIPALE (Cachée tant que non connecté) -->
    <div id="app-section" class="container" style="display: none;">
        <header>
            <div class="logo">
                <!-- Remplace le texte ci-dessous par ton image si besoin : <img src="logo.png" alt="NSH" style="max-height: 40px;"> -->
                NSH | Audit de Conformité
            </div>
            <button class="no-print" onclick="logout()" style="width: auto; background-color: #dc3545; padding: 5px 15px;">Déconnexion</button>
        </header>

        <div class="tabs no-print">
            <div class="tab-btn active" onclick="switchTab('audit')">Nouveau Rapport</div>
            <div class="tab-btn" onclick="switchTab('history')">Historique des Audits</div>
        </div>

        <!-- ONGLET : NOUVEAU RAPPORT -->
        <div id="audit" class="tab-content active">
            <div class="form-group">
                <label>Nom du Client / Chantier :</label>
                <input type="text" id="clientName" placeholder="Ex: Résidence Les Lilas">
            </div>
            
            <div class="form-group">
                <label>Date de l'audit :</label>
                <input type="date" id="auditDate">
            </div>
            
            <div class="form-group">
                <label>Observations et points de contrôle :</label>
                <textarea id="observations" placeholder="Détaillez les éléments techniques validés ou les non-conformités constatées..."></textarea>
            </div>

            <!-- Boutons d'actions -->
            <div class="form-group no-print" style="display: flex; gap: 10px; margin-top: 20px;">
                <button onclick="saveAudit()" style="background-color: #28a745;">💾 Enregistrer dans la base</button>
                <button onclick="window.print()" style="background-color: #17a2b8;">📄 Imprimer / Sauvegarder en PDF</button>
            </div>
            <p id="save-msg" style="color: green; display: none; font-weight: bold;">Rapport enregistré avec succès !</p>
        </div>

        <!-- ONGLET : HISTORIQUE -->
        <div id="history" class="tab-content no-print">
            <h3>Derniers rapports enregistrés</h3>
            <ul id="audit-list" style="padding-left: 20px;">
                <!-- Les rapports Firebase s'afficheront ici -->
            </ul>
        </div>
    </div>

    <!-- 3. SCRIPTS FIREBASE (Version CDN pour tout regrouper dans un seul fichier) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

    <!-- 4. JAVASCRIPT ET LOGIQUE MÉTIER -->
    <script>
        // ==========================================
        // A. CONFIGURATION FIREBASE (À REMPLIR)
        // ==========================================
        const firebaseConfig = {
            apiKey: "COLLE_TON_API_KEY_ICI",
            authDomain: "COLLE_TON_AUTH_DOMAIN_ICI",
            projectId: "COLLE_TON_PROJECT_ID_ICI",
            storageBucket: "COLLE_TON_STORAGE_BUCKET_ICI",
            messagingSenderId: "COLLE_TON_SENDER_ID_ICI",
            appId: "COLLE_TON_APP_ID_ICI"
        };

        // Initialisation de Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();

        // ==========================================
        // B. GESTION DE L'AUTHENTIFICATION
        // ==========================================
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('app-section').style.display = 'block';
                loadAudits(); // Charge l'historique une fois connecté
            } else {
                document.getElementById('login-section').style.display = 'flex';
                document.getElementById('app-section').style.display = 'none';
            }
        });

        function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            auth.signInWithEmailAndPassword(email, password)
                .catch(error => {
                    document.getElementById('auth-error').style.display = 'block';
                    console.error("Erreur de connexion :", error);
                });
        }

        function logout() {
            auth.signOut();
        }

        // ==========================================
        // C. GESTION DE L'INTERFACE (ONGLETS)
        // ==========================================
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');
        }

        // ==========================================
        // D. GESTION DES DONNÉES (FIRESTORE)
        // ==========================================
        function saveAudit() {
            const clientName = document.getElementById('clientName').value;
            const auditDate = document.getElementById('auditDate').value;
            const observations = document.getElementById('observations').value;

            if(!clientName || !auditDate) {
                alert("Veuillez renseigner le nom du client et la date.");
                return;
            }

            db.collection("audits").add({
                client: clientName,
                date: auditDate,
                observations: observations,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                const msg = document.getElementById('save-msg');
                msg.style.display = 'block';
                setTimeout(() => msg.style.display = 'none', 3000); // Disparaît après 3s
                
                // Réinitialise le formulaire
                document.getElementById('clientName').value = '';
                document.getElementById('auditDate').value = '';
                document.getElementById('observations').value = '';
                
                loadAudits(); // Met à jour l'historique
            }).catch(error => {
                console.error("Erreur lors de l'enregistrement :", error);
                alert("Une erreur est survenue lors de la sauvegarde.");
            });
        }

        function loadAudits() {
            db.collection("audits").orderBy("timestamp", "desc").limit(10).get().then(querySnapshot => {
                const list = document.getElementById('audit-list');
                list.innerHTML = ""; // Vide la liste avant de la recharger
                querySnapshot.forEach(doc => {
                    const data = doc.data();
                    const li = document.createElement('li');
                    li.style.marginBottom = "15px";
                    li.style.borderBottom = "1px solid #eee";
                    li.style.paddingBottom = "10px";
                    li.innerHTML = `<strong>${data.client}</strong> - le ${data.date}<br>
                                    <span style="color: #666; font-size: 14px;">${data.observations}</span>`;
                    list.appendChild(li);
                });
            });
        }
    </script>
</body>
</html>
